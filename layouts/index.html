{{ define "main" }}
<div class="container animate-fade-in content-container">
    <section class="board-section" id="board-container" style="width: 100%;"></section>
</div>
{{ $opts := dict "targetPath" "js/flipboard.js" "format" "esm" "minify" hugo.IsProduction }}
{{ with resources.Get "js/main.js" | js.Build $opts }}
  {{ if hugo.IsProduction }}
    {{ with . | resources.Fingerprint }}
      <script src="{{ .RelPermalink }}" type="module" integrity="{{ .Data.Integrity }}" crossorigin="anonymous"></script>
    {{ end }}
  {{ else }}
    <script src="{{ .RelPermalink }}" type="module"></script>
  {{ end }}
{{ end }}
{{ end }}
