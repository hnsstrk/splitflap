{{ define "main" }}
<div class="container type-page animate-fade-in" style="--type-accent: var(--syntax-entity);">
  <span class="type-eyebrow"><span class="te-dot"></span>{{ i18n "eyebrowAbout" }}</span>
  <h1 class="type-megatitle">{{ .Title }}<span class="punct">.</span></h1>

  {{ with .Description }}<p class="type-lede">{{ . }}</p>{{ end }}

  <article class="content-body about-content">
    <figure class="about-avatar">
      <img src="{{ site.Params.avatar | default "images/avatar.png" | relURL }}" alt="{{ site.Params.author | default site.Title }}" width="160" height="160">
    </figure>
    <div class="markdown-content">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
