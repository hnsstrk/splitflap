baseURL = "https://example.org/"

# themesDir — points two levels up so `cd exampleSite && hugo server` works
# without extra flags. Remove or comment out when the exampleSite is used
# outside the theme repository.
themesDir = "../.."

# Site language locale — used for html[lang] (Hugo 0.158+ key, replaces languageCode).
# Common values: "de" (German), "en" (English), "fr" (French).
locale = "en"

defaultContentLanguage = "en"

title = "Splitflap Demo"

# The theme name must match the directory name inside /themes/
theme = "splitflap"

enableRobotsTXT = true

# ---------------------------------------------------------------------------
# [params] — Theme configuration
# ---------------------------------------------------------------------------
[params]
  # Short site description — used in <meta name="description"> and footer tagline.
  description = "A demonstration site for the splitflap."

  # Author name — displayed in the about page avatar alt text and footer.
  author = "Demo Author"

  # Contact email — used by social links in the footer if params.social.email is set.
  email = "demo@example.org"

  # Open Graph image — relative path inside /static/
  # Recommended size: 1200×630 px.
  # Provide your own image in static/images/ — this path is just a placeholder.
  # ogImage = "images/og.png"

  # Open Graph locale tag, e.g. "de_DE", "en_US".
  # Defaults to "de_DE" when not set.
  ogLocale = "en_US"

  # Default color theme on first visit.
  # Options: "light" | "mirage" | "dark"
  defaultTheme = "light"

  # Footer tagline — short description displayed below the site logo in the footer.
  tagline = "A split-flap display theme for Hugo — configure everything in hugo.toml."

  # Footer logo prompt symbol — displayed before the site title in the footer brand.
  logoPrompt = ">"

  # Content license label and URL — displayed in the footer.
  # Uncomment to enable:
  # contentLicense = "CC BY 4.0"
  # contentLicenseUrl = "/licenses/"

  # Avatar image — relative path inside /static/, shown on the About page.
  # Recommended size: 160×160 px.
  avatar = "images/avatar.png"

  # ---------------------------------------------------------------------------
  # [params.social] — Social profile links (rendered in the footer)
  # ---------------------------------------------------------------------------
  [params.social]
    # GitHub username only (e.g. "myuser" → https://github.com/myuser)
    github = "myuser"

    # Mastodon handle — prefix with @ (e.g. "@myuser" → https://mastodon.social/@myuser)
    mastodon = "@myuser"

    # Bluesky handle (e.g. "myuser.bsky.social")
    # bluesky = "myuser.bsky.social"

    # LinkedIn username (e.g. "myuser" → https://linkedin.com/in/myuser)
    # linkedin = "myuser"

  # ---------------------------------------------------------------------------
  # [params.board] — Split-flap board messages for the landing page
  #
  # Format: nested array — each message is an array of up to 7 lines,
  # each line at most 20 characters.
  # Allowed characters: A-Z 0-9 . , - ! ? ' / : and space (uppercase only).
  # Lines are displayed on the split-flap board in sequence, cycling automatically.
  #
  # Example layout (7 rows × 20 columns per message):
  #   Row 0 — blank (top padding)
  #   Row 1 — blank
  #   Row 2 — first line of message text
  #   Row 3 — second line of message text
  #   Row 4 — third line of message text
  #   Row 5 — blank
  #   Row 6 — blank (bottom padding)
  # ---------------------------------------------------------------------------
  [params.board]
    messages = [
      ['', '', 'HELLO WORLD', '', 'SPLITFLAP DEMO', '', ''],
      ['', '', 'CONFIGURE ME', 'IN HUGO.TOML', '', '', ''],
      ['', '', 'OPEN SOURCE', 'MIT LICENSE', '', 'ENJOY', '']
    ]

# ---------------------------------------------------------------------------
# Pagination — controls how many posts appear per blog list page.
# ---------------------------------------------------------------------------
# [pagination]
#   pagerSize = 20

# ---------------------------------------------------------------------------
# Markup settings
# ---------------------------------------------------------------------------
[markup.goldmark.renderer]
  unsafe = false

[markup.goldmark.extensions.typographer]
  disable = true

[markup.goldmark.parser.attribute]
  block = true

[markup.highlight]
  noClasses = false
  lineNos = false

# ---------------------------------------------------------------------------
# Taxonomies
# ---------------------------------------------------------------------------
[taxonomies]
  tag = "tags"

# ---------------------------------------------------------------------------
# [menus] — Navigation links
#
# Each menu entry supports an optional `params.icon` field with a Nerd Font
# codepoint (hex string, no "0x" prefix, no HTML entity syntax).
# The theme renders it as &#x<icon>; inside a .nf-icon span.
#
# Common codepoints used by this theme:
#   f007 — person/user icon  (About)
#   f121 — code icon         (Projects)
#   f02d — book icon         (Blog)
#   f0c1 — chain/link icon   (Links)
# ---------------------------------------------------------------------------
[menus]
  [[menus.main]]
    name = "About"
    url = "/about/"
    weight = 10
    params = { icon = "f007" }

  [[menus.main]]
    name = "Projects"
    url = "/projects/"
    weight = 20
    params = { icon = "f121" }

  [[menus.main]]
    name = "Blog"
    url = "/blog/"
    weight = 25
    params = { icon = "f02d" }

  [[menus.main]]
    name = "Links"
    url = "/links/"
    weight = 30
    params = { icon = "f0c1" }

  # Footer navigation — typically legal / utility pages
  [[menus.footer]]
    name = "Tags"
    url = "/tags/"
    weight = 5

  [[menus.footer]]
    name = "Archive"
    url = "/blog/archive/"
    weight = 6
